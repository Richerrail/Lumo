<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumo 🌟 — Ton ami magique !</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #6EC6FF;
    --sun: #FFD93D;
    --grass: #6BCB77;
    --cloud: #fff;
    --bubble-lumo: #ffffff;
    --bubble-child: #FFD93D;
    --bg: #e8f6ff;
    --accent: #FF6B9D;
    --purple: #B185F5;
    --radius: 28px;
    --shadow: 0 8px 32px rgba(110,198,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── SKY HEADER ── */
  header {
    width: 100%;
    background: linear-gradient(180deg, #87CEEB 0%, #b3e5fc 100%);
    padding: 18px 24px 60px;
    position: relative;
    overflow: hidden;
  }

  .stars {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.3; transform: scale(1); } to { opacity: 1; transform: scale(1.4); } }

  .clouds {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; gap: 40px; align-items: flex-end;
  }
  .cloud {
    background: white;
    border-radius: 50px;
    padding: 14px 28px;
    position: relative;
    opacity: 0.92;
    animation: float 6s ease-in-out infinite;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .cloud::before {
    content: '';
    position: absolute;
    top: -18px; left: 18px;
    width: 40px; height: 40px;
    background: white;
    border-radius: 50%;
  }
  .cloud::after {
    content: '';
    position: absolute;
    top: -10px; right: 20px;
    width: 28px; height: 28px;
    background: white;
    border-radius: 50%;
  }
  .cloud:nth-child(2) { animation-delay: -2s; opacity: 0.8; transform: scale(0.8); }
  .cloud:nth-child(3) { animation-delay: -4s; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .header-content {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 16px;
  }

  .lumo-avatar {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--sun) 0%, #FF9A3C 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 6px 20px rgba(255,180,0,0.4);
    animation: bounce 2s ease-in-out infinite;
    border: 4px solid white;
    flex-shrink: 0;
  }
  @keyframes bounce { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-6px) rotate(3deg); } }

  .header-text h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: #1565C0;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
    line-height: 1.1;
  }
  .header-text p {
    color: #1976D2;
    font-weight: 600;
    font-size: 0.95rem;
  }

  /* ── SETUP PANEL ── */
  .setup-panel {
    background: white;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin: -30px 16px 0;
    box-shadow: var(--shadow);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
    max-width: 700px;
    width: calc(100% - 32px);
  }

  .setup-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 140px;
  }

  .setup-group label {
    font-size: 0.72rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .setup-group input,
  .setup-group select {
    border: 2px solid #e8f0ff;
    border-radius: 14px;
    padding: 10px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #333;
    background: #f8fbff;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .setup-group input:focus,
  .setup-group select:focus { border-color: var(--sky); }

  .setup-group input[type="password"] { letter-spacing: 2px; }

  .btn-start {
    background: linear-gradient(135deg, var(--grass), #4CAF50);
    color: white;
    border: none;
    border-radius: 18px;
    padding: 12px 24px;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(107, 203, 119, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    align-self: flex-end;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(107,203,119,0.5); }
  .btn-start:active { transform: translateY(0); }

  /* ── CHAT AREA ── */
  .chat-wrapper {
    flex: 1;
    width: 100%;
    max-width: 700px;
    padding: 20px 16px 0;
    display: flex;
    flex-direction: column;
  }

  #chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 320px;
    max-height: calc(100vh - 380px);
    scroll-behavior: smooth;
  }

  #chat-box::-webkit-scrollbar { width: 6px; }
  #chat-box::-webkit-scrollbar-track { background: transparent; }
  #chat-box::-webkit-scrollbar-thumb { background: #d0e8ff; border-radius: 10px; }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .msg.lumo { flex-direction: row; }
  .msg.child { flex-direction: row-reverse; }

  .msg-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 3px solid white;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  }
  .msg.lumo .msg-avatar { background: linear-gradient(135deg, var(--sun), #FF9A3C); }
  .msg.child .msg-avatar { background: linear-gradient(135deg, var(--accent), #ff85b3); }

  .bubble {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 22px;
    font-size: 1rem;
    line-height: 1.5;
    font-weight: 600;
    position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,0.07);
  }

  .msg.lumo .bubble {
    background: white;
    color: #333;
    border-bottom-left-radius: 6px;
  }

  .msg.child .bubble {
    background: linear-gradient(135deg, var(--sun), #FFB830);
    color: #333;
    border-bottom-right-radius: 6px;
  }

  /* ── TYPING INDICATOR ── */
  .typing-dots {
    display: flex; gap: 5px; align-items: center; padding: 4px 0;
  }
  .typing-dots span {
    width: 9px; height: 9px;
    background: var(--sky);
    border-radius: 50%;
    animation: dot 1.2s infinite;
    display: inline-block;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { transform: scale(0.7); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }

  /* ── INPUT BAR ── */
  .input-bar {
    background: white;
    border-radius: 28px;
    padding: 10px 10px 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 20px;
    box-shadow: 0 6px 24px rgba(110,198,255,0.2);
    border: 2px solid #e0f0ff;
  }

  #user-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: #333;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }
  #user-input::placeholder { color: #bbb; font-weight: 400; }

  .btn-send {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--sky), #1E88E5);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(30,136,229,0.35);
    flex-shrink: 0;
  }
  .btn-send:hover { transform: scale(1.1); box-shadow: 0 6px 18px rgba(30,136,229,0.5); }
  .btn-send:active { transform: scale(0.95); }
  .btn-send svg { width: 22px; height: 22px; fill: white; }

  /* ── SUGGESTION CHIPS ── */
  .chips {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .chip {
    background: white;
    border: 2px solid #e0f0ff;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: #1976D2;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--sky); color: white; border-color: var(--sky); transform: translateY(-1px); }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    padding: 30px;
    text-align: center;
    color: #aac;
  }
  .empty-state .big-emoji { font-size: 64px; animation: bounce 2s ease-in-out infinite; }
  .empty-state p { font-weight: 600; font-size: 1rem; color: #99b; }

  /* ── ERROR ── */
  .error-msg {
    background: #fff0f3;
    border: 2px solid #ffcdd2;
    border-radius: 16px;
    padding: 12px 16px;
    color: #c62828;
    font-weight: 600;
    font-size: 0.9rem;
    text-align: center;
  }

  /* ── MIC BUTTON ── */
  .btn-mic {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #e91e8c);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(255,107,157,0.35);
    flex-shrink: 0;
  }
  .btn-mic:hover { transform: scale(1.1); box-shadow: 0 6px 18px rgba(255,107,157,0.5); }
  .btn-mic:active { transform: scale(0.95); }
  .btn-mic svg { width: 22px; height: 22px; fill: white; }

  .btn-mic.listening {
    background: linear-gradient(135deg, #ef5350, #c62828);
    animation: pulse-mic 1s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(239,83,80,0.5);
  }
  @keyframes pulse-mic {
    0% { box-shadow: 0 0 0 0 rgba(239,83,80,0.5); }
    70% { box-shadow: 0 0 0 14px rgba(239,83,80,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,83,80,0); }
  }

  .listening-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    background: #fff0f5;
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .listening-indicator.active { display: flex; }
  .listening-wave { display: flex; gap: 3px; align-items: center; }
  .listening-wave span {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .listening-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .listening-wave span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .listening-wave span:nth-child(3) { height: 12px; animation-delay: 0.2s; }
  .listening-wave span:nth-child(4) { height: 20px; animation-delay: 0.3s; }
  .listening-wave span:nth-child(5) { height: 10px; animation-delay: 0.4s; }
  @keyframes wave {
    0%,100% { transform: scaleY(0.5); opacity: 0.7; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* ── SPEAKER BUTTON ON BUBBLE ── */
  .bubble-wrapper { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
  .msg.lumo .bubble-wrapper { align-items: flex-start; }
  .msg.child .bubble-wrapper { align-items: flex-end; }
  .msg.lumo .bubble { max-width: 100%; }
  .msg.child .bubble { max-width: 100%; }

  .btn-speak {
    background: none;
    border: 2px solid #e0f0ff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #90CAF9;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-speak:hover { background: #e8f4ff; border-color: var(--sky); color: #1976D2; }
  .btn-speak.speaking { background: #e8f4ff; border-color: var(--sky); color: #1976D2; }

  /* ── IMAGES DANS LES BULLES ── */
  .bubble-img {
    max-width: 220px;
    border-radius: 14px;
    margin-top: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    display: block;
    cursor: zoom-in;
    transition: transform 0.2s;
  }
  .bubble-img:hover { transform: scale(1.04); }

  /* ── LIENS DANS LES BULLES ── */
  .bubble-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #e8f4ff, #d0eaff);
    border: 2px solid var(--sky);
    border-radius: 14px;
    padding: 8px 14px;
    margin-top: 8px;
    font-size: 0.88rem;
    font-weight: 700;
    color: #1565C0;
    text-decoration: none;
    transition: all 0.15s;
  }
  .bubble-link:hover {
    background: var(--sky);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(110,198,255,0.4);
  }
  .bubble-link::before { content: '🎮'; font-size: 1rem; }

  /* ── RESET BTN ── */
  .btn-reset {
    background: none;
    border: 2px solid #e0f0ff;
    border-radius: 14px;
    padding: 6px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: #999;
    cursor: pointer;
    transition: all 0.15s;
    align-self: center;
    margin-bottom: 6px;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* ── GROUND ── */
  .ground {
    width: 100%;
    height: 20px;
    background: linear-gradient(180deg, var(--grass), #4CAF50);
    position: fixed;
    bottom: 0;
    z-index: 0;
  }

  @media (max-width: 500px) {
    .header-text h1 { font-size: 1.5rem; }
    .bubble { font-size: 0.95rem; max-width: 85%; }
    .setup-panel { flex-direction: column; }
    .btn-start { width: 100%; }
  }
</style>
</head>
<body>

<!-- SKY HEADER -->
<header>
  <div class="stars" id="stars"></div>
  <div class="header-content">
    <div class="lumo-avatar">🌟</div>
    <div class="header-text">
      <h1>Lumo</h1>
      <p>Ton ami magique ✨</p>
    </div>
  </div>
  <div class="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>
</header>

<!-- SETUP -->
<div class="setup-panel">
  <div class="setup-group">
    <label>🔑 Clé API Groq</label>
    <input type="password" id="api-key" placeholder="gsk_xxxxxxxxxxxx">
  </div>
  <div class="setup-group">
    <label>🎂 Âge de l'enfant</label>
    <select id="age-select">
      <option value="3">3 ans</option>
      <option value="4">4 ans</option>
      <option value="5">5 ans</option>
      <option value="6" selected>6 ans</option>
      <option value="7">7 ans</option>
      <option value="8">8 ans</option>
      <option value="9">9 ans</option>
      <option value="10">10 ans</option>
    </select>
  </div>
  <button class="btn-start" onclick="startChat()">Commencer ! 🚀</button>
</div>

<!-- CHAT -->
<div class="chat-wrapper">
  <div id="chat-box">
    <div class="empty-state" id="empty-state">
      <div class="big-emoji">🌟</div>
      <p>Entre ta clé Groq et l'âge de l'enfant<br>puis clique sur <strong>Commencer</strong> !</p>
    </div>
  </div>

  <div class="chips" id="chips" style="display:none">
    <button class="chip" onclick="sendChip('Raconte-moi une histoire ! 📖')">📖 Une histoire</button>
    <button class="chip" onclick="sendChip('On joue aux devinettes ? 🎲')">🎲 Devinettes</button>
    <button class="chip" onclick="sendChip('Pourquoi le ciel est bleu ? 🌈')">🌈 Pourquoi ?</button>
    <button class="chip" onclick="sendChip('Invente une blague ! 😂')">😂 Blague</button>
    <button class="chip" onclick="sendChip('Je veux faire un dessin, aide-moi ! 🎨')">🎨 Dessin</button>
    <button class="chip" onclick="sendChip('On joue à un jeu ensemble ? Propose-moi un jeu et commence à jouer avec moi tout de suite !')">🎮 Jeux</button>
  </div>

  <div class="listening-indicator" id="listening-indicator">
    <div class="listening-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    🎤 Je t'écoute… parle maintenant !
  </div>

  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Dis quelque chose à Lumo... 🌟" onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
    <button class="btn-mic" id="mic-btn" onclick="toggleMic()" disabled title="Parler à Lumo 🎤">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="btn-send" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <button class="btn-reset" id="reset-btn" onclick="resetChat()" style="display:none">🔄 Nouvelle conversation</button>
</div>

<div class="ground"></div>

<script>
// ─── CONFIG ───
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL = "llama-3.3-70b-versatile";

let apiKey = "";
let ageEnfant = 6;
let historique = [];
let isLoading = false;

// ─── SYSTEM PROMPT ───
function getSystemPrompt() {
  return `Tu es Lumo, un ami magique et bienveillant pour les enfants de 3 à 10 ans.
Tu es curieux, joyeux, patient et toujours encourageant.

PERSONNALITÉ :
- Tu parles avec des mots simples, des phrases courtes et claires
- Tu utilises des métaphores du monde des enfants (animaux, magie, aventure)
- Tu es TOUJOURS positif et enthousiaste : "Ouah !", "Super !", "Bravo !"
- Tu poses UNE question à la fin pour garder l'enfant engagé
- Tu utilises des émojis pour rendre les messages vivants

ADAPTATION PAR ÂGE — l'enfant a ${ageEnfant} ans :
${ageEnfant <= 5
  ? "- Phrases TRÈS courtes, vocabulaire ultra simple, beaucoup d'émojis"
  : ageEnfant <= 8
  ? "- Phrases courtes et claires, petites explications simples, enthousiasme"
  : "- Phrases un peu plus élaborées, petites blagues, explications intéressantes"}

CE QUE TU FAIS BIEN :
- Raconter des histoires courtes et imaginatives
- Jouer à des devinettes, charades, "je pense à un animal", "vrai ou faux"
- Expliquer des concepts de façon magique et simple
- Aider avec les devoirs sans donner la réponse directement
- Inventer des petites rimes et comptines

JEUX INTERACTIFS — quand l'enfant veut jouer :
Propose un de ces jeux et anime-le toi-même tour par tour :
- Je pense à un animal (tu penses à un animal, l'enfant pose des questions oui/non)
- Vrai ou Faux (tu poses des affirmations rigolotes)
- Le mot mystère (tu donnes des indices un par un)
- Continue l'histoire (vous construisez une histoire ensemble)
- Charades (tu poses une charade classique)
Anime le jeu activement : donne les réponses, compte les points, félicite !

IMAGES POUR LES DESSINS :
Quand l'enfant parle de dessin ou veut un modèle, ajoute UNE image d'exemple avec ce format exact sur une ligne seule :
[IMG:https://upload.wikimedia.org/wikipedia/commons/thumb/.../url.jpg]

// ─── STARS ───

  for (let i = 0; i < 15; i++) {

    s.className = 'star';

// ─── START ───
async function startChat() {
  const key = document.getElementById('api-key').value.trim();
  const age = parseInt(document.getElementById('age-select').value);

  if (!key || !key.startsWith('gsk_')) {
    shakeInput('api-key');
    alert("⚠️ Entre une clé API Groq valide (elle commence par gsk_)\n\nObtiens-en une gratuite sur console.groq.com");
    return;
  }

  apiKey = key;
  ageEnfant = age;
  historique = [];

  // Demander la permission micro UNE SEULE FOIS ici
  requestMicOnStart();

  // Enable UI
  document.getElementById('user-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('mic-btn').disabled = false;
  document.getElementById('chips').style.display = 'flex';
  document.getElementById('reset-btn').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';

  // Welcome message
  await sendToGroq(`Dis bonjour à un enfant de ${age} ans qui commence à jouer avec toi ! Présente-toi en tant que Lumo de manière magique et enthousiaste.`, true);

  document.getElementById('user-input').focus();
}

// ─── SEND ───
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading || !apiKey) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('child', text);
  await sendToGroq(text, false);
}

async function sendChip(text) {
  if (isLoading || !apiKey) return;
  addMessage('child', text);
  await sendToGroq(text, false);
}

// ─── API CALL ───
async function sendToGroq(userMessage, isSystem) {
  if (!isSystem) {
    historique.push({ role: "user", content: userMessage });
  }

  isLoading = true;
  const typingId = addTyping();

  try {
    const messages = [
      { role: "system", content: getSystemPrompt() },
      ...historique
    ];

    if (isSystem) {
      messages.push({ role: "user", content: userMessage });
    }

    const res = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: MODEL,
        messages,
        temperature: 0.85,
        max_tokens: 280,
        top_p: 0.9
      })
    });

    removeTyping(typingId);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Erreur ${res.status}`);
    }

    const data = await res.json();
    const reply = data.choices[0].message.content;

    historique.push({ role: "assistant", content: reply });
    if (historique.length > 30) historique = historique.slice(-30);

    addMessage('lumo', reply);

  } catch (err) {
    removeTyping(typingId);
    addError(err.message);
  }

  isLoading = false;
}

// ─── DOM HELPERS ───

// Formate le texte Lumo : parse [IMG:url] et [LINK:url|texte], rend les emojis, sauts de ligne
function formatLumoText(raw) {
  // Echapper d'abord le HTML
  let html = escapeHtml(raw);

  // Parser [IMG:url]
  html = html.replace(/\[IMG:(https?:\/\/[^\]]+)\]/g, (_, url) =>
    `<br><img class="bubble-img" src="${url}" alt="image pour dessiner" onerror="this.style.display='none'">`
  );

  // Parser [LINK:url|texte]
  html = html.replace(/\[LINK:(https?:\/\/[^|]+)\|([^\]]+)\]/g, (_, url, texte) =>
    `<br><a class="bubble-link" href="${url}" target="_blank" rel="noopener noreferrer">${texte}</a>`
  );

  // Sauts de ligne
  html = html.replace(/\n/g, '<br>');

  return html;
}

function addMessage(who, text) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = `msg ${who}`;

  const avatar = who === 'lumo' ? '🌟' : '👦';

  if (who === 'lumo') {
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="bubble-wrapper">
        <div class="bubble">${formatLumoText(text)}</div>
        <button class="btn-speak" title="Écouter Lumo 🔊">🔊 Écouter</button>
      </div>
    `;
    // Attacher le texte via dataset pour éviter tout problème d'échappement
    const btn = div.querySelector('.btn-speak');
    btn.dataset.text = text;
    btn.addEventListener('click', function() {
      speakText(this, this.dataset.text);
    });
  } else {
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="bubble-wrapper">
        <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
      </div>
    `;
  }
  box.appendChild(div);
  scrollBottom();

  // Auto-lecture pour Lumo
  if (who === 'lumo' && autoSpeak) {
    const btn = div.querySelector('.btn-speak');
    if (btn) speakText(btn, text);
  }
}

let typingCounter = 0;
function addTyping() {
  const box = document.getElementById('chat-box');
  const id = `typing-${++typingCounter}`;
  const div = document.createElement('div');
  div.className = 'msg lumo';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">🌟</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  box.appendChild(div);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function addError(msg) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.innerHTML = `⚠️ Oups ! ${escapeHtml(msg)}<br><small>Vérifie ta clé API Groq et réessaie.</small>`;
  box.appendChild(div);
  scrollBottom();
}

function scrollBottom() {
  const box = document.getElementById('chat-box');
  setTimeout(() => box.scrollTop = box.scrollHeight, 50);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetChat() {
  historique = [];
  const box = document.getElementById('chat-box');
  box.innerHTML = '';
  if (apiKey) {
    sendToGroq(`Dis bonjour à un enfant de ${ageEnfant} ans qui recommence à jouer avec toi !`, true);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function shakeInput(id) {
  const el = document.getElementById(id);
  el.style.animation = 'none';
  el.style.borderColor = '#ef5350';
  setTimeout(() => { el.style.borderColor = ''; }, 2000);
}

// ─── VOCAL : SYNTHÈSE (Lumo parle) ───
let autoSpeak = false;
let currentUtterance = null;

function cleanForTTS(text) {
  return text
    // Supprimer les balises [IMG:...] et [LINK:...|...]
    .replace(/\[IMG:[^\]]+\]/g, '')
    .replace(/\[LINK:[^\]]+\]/g, '')
    // Supprimer TOUS les emojis (plages Unicode complètes)
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[\u{FE00}-\u{FEFF}]/gu, '')
    .replace(/[\u{1F900}-\u{1F9FF}]/gu, '')
    .replace(/[\u2702-\u27B0]/gu, '')
    .replace(/[\u{E000}-\u{F8FF}]/gu, '')
    // Nettoyer les espaces multiples
    .replace(/\s+/g, ' ')
    .trim();
}

function speakText(btn, text) {
  if (!window.speechSynthesis) return;

  const clean = cleanForTTS(text);

  // Si déjà en train de parler → stopper
  if (currentUtterance && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.btn-speak').forEach(b => {
      b.textContent = '🔊 Écouter';
      b.classList.remove('speaking');
    });
    currentUtterance = null;
    return;
  }

  if (!clean) return;

  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR';
  utter.rate = ageEnfant <= 5 ? 0.82 : 0.92;
  utter.pitch = 1.15;
  utter.volume = 1;

  // Choisir une voix française si disponible
  const voices = window.speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr') && v.name.toLowerCase().includes('female'))
                || voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) utter.voice = frVoice;

  btn.textContent = '⏹ Stop';
  btn.classList.add('speaking');
  currentUtterance = utter;

  utter.onend = utter.onerror = () => {
    btn.textContent = '🔊 Écouter';
    btn.classList.remove('speaking');
    currentUtterance = null;
  };

  window.speechSynthesis.speak(utter);
}

// ─── VOCAL : RECONNAISSANCE (l'enfant parle) ───
// On crée UN SEUL objet SpeechRecognition et on ne touche jamais à getUserMedia.
// SpeechRecognition gère la permission tout seul — Chrome ne la redemande pas
// si elle a déjà été accordée pour cette origine.
let recognition = null;
let isListening = false;

function initRecognition() {
  if (recognition) return; // déjà créé
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = true;

  const input    = () => document.getElementById('user-input');
  const micBtn   = () => document.getElementById('mic-btn');
  const indicator= () => document.getElementById('listening-indicator');

  recognition.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    input().value = t;
    autoResize(input());
  };

  recognition.onend = () => {
    if (!isListening) return;          // stop manuel → on ne renvoie pas
    isListening = false;
    micBtn().classList.remove('listening');
    indicator().classList.remove('active');
    const txt = input().value.trim();
    if (txt) sendMessage();
  };

  recognition.onerror = (e) => {
    if (e.error === 'aborted' || e.error === 'no-speech') return;
    isListening = false;
    micBtn().classList.remove('listening');
    indicator().classList.remove('active');
    if (e.error === 'not-allowed')
      addError("Micro non autorisé. Clique sur 🔒 dans la barre d'adresse et autorise le micro.");
    else
      addError(`Micro : ${e.error}`);
  };
}

function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("😕 Reconnaissance vocale non supportée.\nEssaie Chrome ou Edge !"); return; }

  if (isListening) { stopMic(); return; }

  initRecognition(); // crée l'objet une seule fois

  isListening = true;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('listening-indicator').classList.add('active');
  document.getElementById('user-input').value = '';

  try { recognition.start(); } catch(e) { /* déjà démarré */ }
}

function stopMic() {
  isListening = false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('listening-indicator').classList.remove('active');
  try { recognition && recognition.stop(); } catch(e) {}
}

function requestMicOnStart() { /* plus nécessaire, SpeechRecognition gère tout */ }

// Charger les voix dès que possible
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
